app = "dotadash-backend-nyhnaaaa"
primary_region = "sjc"

[build]

[env]
PUBLIC_BASE_URL = "https://dist-dpghsigt.devinapps.com"
BACKEND_BASE_URL = "https://dotadash-backend-nyhnaaaa.fly.dev"
CORS_ORIGINS = "https://dist-dpghsigt.devinapps.com"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
cpu_kind = "shared"
cpus = 1
